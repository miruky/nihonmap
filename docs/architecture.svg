<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-labelledby="arch-title">
  <title id="arch-title">nihonmapのアーキテクチャ図。Natural Earthのデータをビルドスクリプトが整数座標へ変換し、ライブラリがSVG描画とイベント処理を提供し、デモが利用する。</title>
  <style>
    :root {
      --ink: #232b32;
      --muted: #5d6a74;
      --line: #8d99a3;
      --panel: #f4f6f8;
      --accent: #2f6695;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #dee4e9;
        --muted: #93a0aa;
        --line: #5d6a74;
        --panel: #1f262c;
        --accent: #6ba3d6;
      }
    }
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: var(--ink, currentColor); }
    .name { font-size: 15px; font-weight: 600; }
    .desc { font-size: 12px; fill: var(--muted, currentColor); }
    .label { font-size: 12px; fill: var(--muted, currentColor); }
    .group-name { font-size: 13px; font-weight: 600; fill: var(--muted, currentColor); letter-spacing: 0.04em; }
    .box { fill: var(--panel, none); stroke: var(--line, currentColor); stroke-width: 1.5; }
    .actor { fill: none; stroke: var(--line, currentColor); stroke-width: 1.5; stroke-dasharray: 5 4; }
    .proc { fill: none; stroke: var(--accent, currentColor); stroke-width: 1.5; }
    .flow { fill: none; stroke: var(--line, currentColor); stroke-width: 1.5; marker-end: url(#arrow); }
    .flow2 { fill: none; stroke: var(--line, currentColor); stroke-width: 1.5; marker-start: url(#arrow); marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="var(--line, currentColor)"/>
    </marker>
  </defs>

  <!-- データ生成(ビルド時) -->
  <rect class="actor" x="32" y="56" width="184" height="64" rx="10"/>
  <text class="name" x="124" y="84" text-anchor="middle">Natural Earth 1:10m</text>
  <text class="desc" x="124" y="104" text-anchor="middle">admin-1 GeoJSON(39MB)</text>

  <rect class="box" x="32" y="180" width="184" height="80" rx="10"/>
  <text class="name" x="124" y="208" text-anchor="middle">build-data.mjs</text>
  <text class="desc" x="124" y="228" text-anchor="middle">日本を抽出・小島を間引き</text>
  <text class="desc" x="124" y="246" text-anchor="middle">簡略化・整数へ量子化</text>

  <path class="flow" d="M124 120v54"/>
  <text class="label" x="134" y="152">ビルド時に1回</text>

  <!-- ライブラリ -->
  <rect class="proc" x="264" y="24" width="360" height="412" rx="14"/>
  <text class="group-name" x="288" y="52">src/lib(実行時依存ゼロ)</text>

  <rect class="box" x="288" y="68" width="312" height="56" rx="10"/>
  <text class="name" x="444" y="92" text-anchor="middle">data/prefectures.ts</text>
  <text class="desc" x="444" y="110" text-anchor="middle">47都道府県の整数座標とメタ情報(53KB)</text>

  <rect class="box" x="288" y="156" width="148" height="64" rx="10"/>
  <text class="name" x="362" y="184" text-anchor="middle">color.ts</text>
  <text class="desc" x="362" y="202" text-anchor="middle">色スケール</text>

  <rect class="box" x="452" y="156" width="148" height="64" rx="10"/>
  <text class="name" x="526" y="184" text-anchor="middle">geometry.ts</text>
  <text class="desc" x="526" y="202" text-anchor="middle">投影・パス化</text>

  <rect class="box" x="288" y="252" width="312" height="56" rx="10"/>
  <text class="name" x="444" y="276" text-anchor="middle">render.ts</text>
  <text class="desc" x="444" y="294" text-anchor="middle">SVG文字列を組み立てる純関数</text>

  <rect class="box" x="288" y="340" width="312" height="64" rx="10"/>
  <text class="name" x="444" y="366" text-anchor="middle">map.ts(JapanMap)</text>
  <text class="desc" x="444" y="386" text-anchor="middle">イベント委譲・選択状態・差し替え描画</text>

  <path class="flow" d="M216 200H240Q252 200 252 188V108Q252 96 264 96H280"/>
  <text class="label" x="224" y="152">生成</text>
  <path class="flow" d="M526 124v26"/>
  <path class="flow" d="M444 308v26"/>
  <path class="flow" d="M362 220v26"/>
  <path class="flow" d="M526 220v26"/>

  <!-- 利用側 -->
  <rect class="actor" x="672" y="156" width="176" height="80" rx="10"/>
  <text class="name" x="760" y="184" text-anchor="middle">手持ちのGeoJSON</text>
  <text class="desc" x="760" y="204" text-anchor="middle">市区町村境界などを</text>
  <text class="desc" x="760" y="222" text-anchor="middle">同じ座標系へ重ねる</text>

  <rect class="actor" x="672" y="324" width="176" height="96" rx="10"/>
  <text class="name" x="760" y="352" text-anchor="middle">デモ(main.ts)</text>
  <text class="desc" x="760" y="372" text-anchor="middle">コロプレス・凡例</text>
  <text class="desc" x="760" y="390" text-anchor="middle">ツールチップ</text>
  <text class="desc" x="760" y="408" text-anchor="middle">URLへの状態保存</text>

  <path class="flow" d="M672 196h-68"/>
  <text class="label" x="638" y="188" text-anchor="middle">入力</text>
  <path class="flow2" d="M624 372h44"/>
  <text class="label" x="646" y="364" text-anchor="middle">利用</text>
</svg>
